version: 2

models:
  - name: dbt_fenix_articulos
    description: |
      Modelo de la capa Silver con los artículos provenientes de Fenix. Realiza limpieza de texto, extracción
      de atributos mediante expresiones regulares y categorización de planes.

      Los valores del seed `fenix_articulos_corregidos` tienen prioridad sobre los derivados automáticamente
      (FULL OUTER JOIN con COALESCE). Esto permite corregir o enriquecer artículos sin modificar el sistema origen.
    columns:
      - name: creation_date
        description: "Fecha de creación del registro en la capa bronze. Proviene directamente sin transformaciones."

      - name: update_date
        description: "Fecha de última actualización del registro en la capa bronze. Proviene directamente sin transformaciones."

      - name: codigo
        description: |
          Código único del artículo. Corresponde al campo `codart` en el origen.

          **Transformaciones:**
          - Se eliminan espacios en blanco (`TRIM`).
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: warn

      - name: nombre
        description: |
          Nombre principal del artículo. Corresponde al campo `nomart` en el origen.

          **Transformaciones:**
          - Se eliminan espacios en blanco y se convierte a mayúsculas (`UPPER`, `TRIM`).
          - Se estandariza la ortografía reemplazando `'ANIO'` por `'ANO'`.

      - name: familia
        description: |
          Categoría o familia del artículo. Derivada del campo `nomart2` del origen.

          **Transformaciones:**
          - Se limpian espacios, se convierte a mayúsculas y los valores vacíos se reemplazan por `NULL`.
          - **Reglas de reclasificación** basadas en el contenido de `nombre`:
            1. `'UPGRADE'` si el nombre contiene dicha palabra.
            2. `'PUNTO DE EMISION'` si el nombre contiene dicha palabra.
            3. `'FIRMAS ELECTRONICAS'` si el nombre indica firma electrónica y tiene `vigencia` válida.
            4. `'SISTEMA DE FACTURACION'` si el nombre contiene `'FACT'` y tiene un `tipo_plan` asignado.
            5. Si no aplica ninguna regla anterior, mantiene el valor original de `nomart2`.

      - name: vigencia
        description: |
          Período de vigencia del artículo, extraído del `nombre` mediante expresión regular.

          Formato: número seguido de `'MES'`, `'MESES'`, `'ANO'`, `'ANOS'`, `'SEMANA'` o `'SEMANAS'`.
          Ejemplo: `'12 MESES'`, `'2 ANOS'`.

      - name: tipo_plan
        description: |
          Tier o nivel del plan comercial del artículo. Aplicable a la familia `'SISTEMA DE FACTURACION'`.

          **Transformaciones:** Extraído del `nombre` mediante regex buscando `'X TRANSACC'` o `'PLAN ILIMITADO'`.

          **Mapeo de valores:**
          - `'25 TRANSACC'` → `'PLAN MINI'`
          - `'75 TRANSACC'` → `'PLAN BASICO'`
          - `'150 TRANSACC'` → `'PLAN ESENCIAL'`
          - `'350 TRANSACC'` → `'PLAN ESTANDAR'`
          - `'PLAN ILIMITADO'` → `'PLAN PREMIUM'`
          - Otros patrones con `'TRANSACC'` → prefijo `'PLAN '` concatenado.

      - name: concepto
        description: |
          Subtipo o clasificación adicional del artículo dentro de su familia. Distingue variantes de un mismo
          producto (ej. con o sin firma electrónica incorporada para artículos de Sistema de Facturación).

          Este campo se ingresa manualmente en el seed `fenix_articulos_corregidos` y no se deriva
          automáticamente del sistema Fenix. Se usa en el datamart de ventas para agrupar artículos SF
          por tipo de producto junto con `vigencia`, `familia` y `tipo_plan`.


  - name: dbt_fenix_facturas
    description: |
      Modelo de la capa Silver con las facturas transformadas. Estandariza textos, extrae el código de
      descuento de los comentarios, determina la sucursal de emisión mediante cruce con los puntos de
      emisión y enriquece con el grupo vendedor proveniente de Camunda.

      Se excluyen las facturas con `total_iva = 0` (firmas anuladas cuyo IVA es cero). Las notas de
      crédito se incluyen pero se identifican con `is_nc = TRUE`.
    columns:
      - name: codigo_factura
        description: |
          Identificador único del documento en el sistema Fenix. Corresponde al campo `numfac` en el origen.

          **Regla de negocio:** `numfac` es el identificador único por documento. Cada factura y cada nota
          de crédito tienen un `codigo_factura` distinto. Si el valor comienza con `'DV'`, el documento
          es una nota de crédito.
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: warn

      - name: codigo_documento
        description: |
          Identificador único del proceso de facturación. Corresponde al campo `numdoc` en el origen.

          **Regla de negocio:** Una factura y su nota de crédito (anulación) comparten el mismo
          `codigo_documento`. Si el campo está vacío en el origen, se asigna el valor de `codigo_factura`.

      - name: codigo_cliente
        description: "Código del cliente al que se emite la factura. Clave foránea hacia `fenix_clientes.codcli`."

      - name: numero_factura
        description: |
          Número de factura completo, legible para el negocio. Se construye concatenando `numser`
          (número de serie del establecimiento y punto de emisión) con `pedido` (secuencia correlativa).

          Ejemplo: `'001-001-000000001'`.
        tests:
          - not_null:
              config:
                severity: warn

      - name: numero_serie
        description: |
          Número de serie del establecimiento y punto de emisión que emitió la factura.
          Corresponde al campo `numser` en el origen.

          Se usa para cruzar con `puntos_emision.serial_punto_emision` y determinar el `id_sucursal`
          correspondiente, validando que `fecha_emision` esté dentro del rango `[fecha_apertura, fecha_cierre)`.

      - name: comentario_1
        description: "Primer campo de comentario de la factura, convertido a mayúsculas."

      - name: comentario_2
        description: |
          Segundo campo de comentario de la factura, convertido a mayúsculas.

          Contiene el código de descuento con el formato `'CODDESCUENTO <codigo>'`. También puede
          contener el texto `'RENOVACION'`, que se usa para identificar ventas de renovación en la
          lógica de clasificación del grupo COMERCIAL.

      - name: comentario_3
        description: |
          Tercer campo de comentario de la factura, convertido a mayúsculas.

          En ventas automatizadas contiene el código del catálogo de productos (`fenix_codigos`).
          También puede contener indicadores de clasificación de venta:
          - `'COMERCIAL'`: venta del equipo comercial (incluye corrección del error tipográfico `'COEMRCIAL'`).
          - `'F.E.F.A.V.'`: firmas emitidas a Alianza del Valle, facturadas de forma individual.
          - Valores con `'TERCER'`: ventas a través de terceros.
          - Valores con `'DISTRIBUI'`: ventas a través de distribuidores.
          - Valores con `'AGENT'`: ventas a través de agentes.
          - En facturas de convenio con nota de crédito, el sufijo del código cambia a `.CN` para trazabilidad.
          - `'SF.CA.MANUAL'`: asignado automáticamente cuando el comentario tiene el formato
            `'ADICIONAL X COMPROBANTES'`.

      - name: codigo_descuento
        description: |
          Código de descuento extraído del campo `comentario_2`. Se parsea buscando el patrón
          `'CODDESCUENTO <codigo>'`.

          Si no se encuentra ningún código, se asigna `'SIN CODIGO DE DESCUENTO'`.

      - name: subtotal
        description: "Monto subtotal de la factura antes de impuestos y descuentos."

      - name: valor_descuento
        description: "Monto total del descuento global aplicado a la factura. Corresponde al campo `desc0` en el origen."

      - name: total
        description: "Monto total final de la factura (subtotal − descuentos + IVA)."

      - name: total_iva
        description: "Monto total de IVA calculado para la factura."

      - name: codigo_vendedor
        description: |
          Código del vendedor que realizó la venta. Corresponde al campo `codven` en el origen.

          **Normalización:** Los códigos `'0'`, `'28'`, `'123'` y `'NO'` se reemplazan por `'1001'`
          (vendedor interno por defecto para ventas sin vendedor asignado).

      - name: fecha_emision
        description: "Fecha de emisión de la factura en formato DATE. Extraída del campo `emision` del origen."

      - name: id_sucursal
        description: |
          Identificador de la sucursal que emitió la factura, determinado cruzando `numero_serie` con
          `puntos_emision.serial_punto_emision` y validando que `fecha_emision` esté dentro del rango
          `[fecha_apertura, fecha_cierre)`.

          Para las facturas presentes en el seed `reasignacion_islas_temporales`, el `id_sucursal`
          se sobreescribe con el valor de reasignación manual.

      - name: grupo_vendedor_temp
        description: |
          Grupo vendedor proveniente del sistema Camunda, propagado desde la primera aprobación del
          trámite asociado al `codigo_documento`.

          Se usa como valor de respaldo en la tabla de hechos cuando ninguna otra regla de negocio
          determina el grupo vendedor. Es `NULL` si no hay coincidencia en Camunda.

      - name: is_nc
        description: |
          Indicador de que el documento es una nota de crédito (anulación de factura).

          `TRUE` si `codigo_factura` comienza con `'DV'`; `FALSE` en caso contrario.


  - name: dbt_fenix_clientes
    description: |
      Modelo de la capa Silver con los clientes provenientes de Fenix. Estandariza textos e identifica
      clientes pertenecientes al grupo corporativo de Security Data.
    columns:
      - name: creation_date
        description: "Fecha de creación del registro en la capa bronze."

      - name: update_date
        description: "Fecha de última actualización del registro en la capa bronze."

      - name: codigo
        description: |
          Código identificador único del cliente en el sistema Fenix. Corresponde al campo `codcli`
          en el origen.
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: warn

      - name: nombre
        description: "Nombre completo o razón social del cliente, en mayúsculas."

      - name: cif
        description: "Número de identificación fiscal del cliente (RUC, cédula u otro documento), usado para la emisión de facturas."

      - name: is_same_corporate_group
        description: |
          Indica si el cliente pertenece al grupo corporativo de Security Data.

          `TRUE` para los CIFs: `0991327371001` (Telconet), `1792186927001` (GK), `1792496136001` (Systor).

          Se usa en la tabla de hechos para clasificar las ventas de la familia `'LICENCIAS'` a estos
          clientes bajo el grupo `'LICENCIAS TELCONET'`.


  - name: dbt_fenix_tranfac
    description: |
      Modelo de la capa Silver con el detalle de líneas de factura proveniente de Fenix.
      Aplica únicamente transformaciones de limpieza y renombramiento de campos.
    columns:
      - name: creation_date
        description: "Fecha de creación del registro en la capa bronze."

      - name: update_date
        description: "Fecha de última actualización del registro en la capa bronze."

      - name: unico
        description: "Identificador único de la línea de transacción en el sistema Fenix."
        tests:
          - not_null:
              config:
                severity: warn

      - name: codigo_factura
        description: "Número de factura al que pertenece esta línea. Clave foránea hacia `fenix_facturas.numfac`. Corresponde al campo `numfac` en el origen."

      - name: codigo_articulo
        description: "Código del artículo vendido en esta línea. Clave foránea hacia `fenix_articulos.codart`. Corresponde al campo `codart` en el origen."

      - name: cantidad_articulos
        description: "Cantidad de unidades del artículo vendidas en esta línea. Corresponde al campo `cantidad_d` en el origen."

      - name: valor_unitario
        description: "Precio unitario del artículo antes de aplicar descuentos. Corresponde al campo `precio` en el origen."

      - name: porcentaje_descuento
        description: "Porcentaje de descuento aplicado al precio unitario en esta línea. Corresponde al campo `desct` en el origen."

      - name: porcentaje_iva
        description: |
          Porcentaje de IVA aplicado a la línea de factura. Corresponde al campo `iva` en el origen.

          Valores posibles: `0` (facturas excluidas del pipeline por `total_iva = 0` en la cabecera), `12` (tasa histórica hasta 2024), `15` (tasa vigente desde 2024).


  - name: dbt_fenix_vendedores
    description: |
      Modelo de la capa Silver con los vendedores provenientes de Fenix.
      Aplica únicamente limpieza y estandarización de texto.
    columns:
      - name: creation_date
        description: "Fecha de creación del registro en la capa bronze."

      - name: update_date
        description: "Fecha de última actualización del registro en la capa bronze."

      - name: codigo
        description: "Código identificador único del vendedor en el sistema Fenix. Corresponde al campo `codven` en el origen."
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: warn

      - name: nombre
        description: "Nombre completo del vendedor, en mayúsculas."

      - name: fecha_actualizacion
        description: "Fecha de última actualización del registro del vendedor en el sistema Fenix."


  - name: dbt_fenix_codigos
    description: |
      Modelo de la capa Silver con el catálogo de códigos de productos proveniente de Fenix. Corresponde
      a los códigos que aparecen en el campo `comentario_3` (`comen3`) de las facturas.

      En ventas automatizadas el código se registra automáticamente; en facturas manuales este campo
      puede estar vacío o contener texto libre, por lo que no siempre es posible identificar el producto
      mediante este catálogo.

      Los únicos cambios aplicados son limpieza de texto (`TRIM`, `UPPER`).
    columns:
      - name: id_codigo
        description: "Identificador único del código de producto en la tabla de origen."
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: warn

      - name: codigo
        description: "Código del producto, equivalente al valor que aparece en el campo `comentario_3` de las facturas."
        tests:
          - unique:
              config:
                severity: warn

      - name: codigo_nombre
        description: "Nombre o descripción del producto asociado al código."

      - name: familia_producto
        description: "Familia o categoría del producto (ej. `'FIRMAS ELECTRONICAS'`, `'SISTEMA DE FACTURACION'`)."

      - name: atencion
        description: "Tipo de canal o modalidad de atención del producto. El valor `'CONVENIOS'` identifica productos vendidos bajo convenios institucionales."

      - name: venta_dirigida
        description: "Segmento de cliente objetivo al que se dirige la venta del producto."

      - name: concepto_1
        description: |
          Primera clasificación adicional del producto. En el datamart de ventas se usa para mapear
          artículos de Sistema de Facturación al campo `concepto` de la dimensión de artículos.

      - name: concepto_2
        description: |
          Segunda clasificación adicional del producto. Se usa como respaldo para determinar el
          `tipo_venta` en la dimensión de facturas cuando Camunda no provee esa información.

      - name: plan
        description: "Plan comercial del producto. En el datamart de ventas se usa para cruzar con el `tipo_plan` de la dimensión de artículos de Sistema de Facturación."

      - name: vigencia
        description: "Período de vigencia del producto, con el prefijo `'VIGENCIA '` ya eliminado."


  - name: dbt_camunda_operatividad
    description: |
      Modelo de la capa Silver con los trámites de firma digital y sistema de facturación provenientes
      de Camunda. Clasifica cada trámite como `NUEVO` o `RENOVACION` según si es la primera emisión del
      producto para ese solicitante, y deduplica registros por `serial_firma`.

      **Fuentes de datos cargadas en el bronze:**
      - Registros de firmas en estado de emisión o aprobación (Portal SUBCA).
      - Registros de facturas asociadas a trámites finalizados (Portal Camunda).
      - Registros de facturas anuladas para mantener trazabilidad de tipo de venta.

      **Clasificación NUEVO / RENOVACION:**
      - `NUEVO`: el trámite corresponde a la primera aprobación del producto para ese solicitante.
      - `RENOVACION`: existen aprobaciones anteriores del mismo producto para el mismo solicitante.
      - La partición para la primera aprobación usa `cedula` para FIRMA y `ruc_aux` para SF.
        A partir del 2026-04-09 la partición también considera el tipo de `producto`.

      **Deduplicación:** Por `serial_firma` se conserva el registro en estado `APROBADO` si existe;
      de lo contrario, el más reciente por `fecha_aprobacion`.
    columns:
      - name: cedula
        description: "Número de cédula de identidad del solicitante o titular del trámite de firma digital."

      - name: fecha_aprobacion
        description: |
          Fecha y hora de aprobación del trámite. Si la aprobación no existe, se usa
          `fecha_inicio_tramite` como valor de respaldo (`COALESCE`).

      - name: numero_factura
        description: "Número de factura asociado al trámite. Corresponde al campo `factura` en el origen."

      - name: ruc
        description: "RUC de la empresa vinculada al trámite."

      - name: tipo_firma
        description: "Tipo de firma digital del trámite. Valores: `'TOKEN'` (dispositivo físico) o `'ARCHIVO'` (archivo P12 o nube)."

      - name: serial_firma
        description: "Número de serie o identificador único del certificado de firma digital. Es la clave de deduplicación del modelo."

      - name: fecha_inicio_tramite
        description: "Fecha y hora en que se inició formalmente el trámite en el sistema."

      - name: ruc_aux
        description: |
          RUC de la empresa para la cual se realiza el trámite de Sistema de Facturación (SF).

          Para trámites de tipo SF, este campo identifica a la empresa emisora de comprobantes electrónicos.
          Se usa como clave de partición (en lugar de `cedula`) para determinar si una venta SF es nueva o
          renovación, ya que en SF el identificador del proceso es la empresa, no la persona natural.

      - name: medio
        description: "Medio o canal a través del cual se realizó el trámite. Valores: `'TOKEN'` o `'ARCHIVO'`."

      - name: sf_control
        description: "Identificador de control del trámite en el sistema de facturación electrónica."

      - name: producto
        description: |
          Tipo de producto del trámite, normalizado a dos valores.

          - `'FIRMA'`: firma digital. Incluye los valores de origen `'EMISION'` y `'RENOVACION'`.
          - `'SF'`: sistema de facturación electrónica. Incluye `'EMISION SF SIN FIRMA'`, `'SF SIN FIRMA'`,
            `'SF CON FIRMA'`, `'RENOVACION SF'`, `'EMISION SF'`.

      - name: grupo_vendedor
        description: |
          Grupo comercial responsable del trámite, proveniente directamente del sistema Camunda.

          Se propaga a la tabla Silver de facturas (`grupo_vendedor_temp`) y se usa como valor de
          respaldo en la asignación del grupo vendedor de la tabla de hechos.

      - name: estado
        description: |
          Estado del trámite en Camunda. El valor `'APROBADO'` es el determinante para la lógica
          de clasificación de ventas nuevas vs. renovaciones.

      - name: fecha_factura
        description: "Fecha de la factura vinculada al trámite. Se usa en la clasificación NUEVO/RENOVACION para trámites no aprobados."

      - name: fecha_primer_aprobado
        description: |
          Fecha de la primera aprobación registrada para el solicitante y tipo de producto. Es la
          referencia para determinar si un trámite es NUEVO o RENOVACION.

          - Para FIRMA: mínimo de `fecha_aprobacion` donde `estado = 'APROBADO'`, particionado por
            `cedula` (y `producto` desde 2026-04-09).
          - Para SF: mínimo de `fecha_aprobacion` donde `estado = 'APROBADO'`, particionado por
            `ruc_aux` (y `producto` desde 2026-04-09).

      - name: tipo_venta
        description: |
          Clasificación del trámite según si es una venta nueva o una renovación.

          - `'NUEVO'`: primera aprobación del producto para el solicitante.
          - `'RENOVACION'`: aprobaciones subsiguientes.
          - `'N/A'`: casos borde donde la fecha del trámite coincide exactamente con la primera aprobación.