version: 2

sources:
  - name: features_prev
    schema: features
    description: |
      En el momento que se realizo este proyecto solo tu yo dios conocian lo que se realizo, si estas leyendo esto
      mucho despues significa que solo dios sabe lo que se realizo. Ruega haber agregado la documentcion de todos
      los cambios del DataWarehouse y que tu documentacion sea entendible. ZALY-CB
      
      Este source corresponde al esquema features, específicamente para las tablas de puntos_emision y sucursales.

      Si se necesita agregar un nuevo punto de emisión, los cambios deben realizarse directamente en estas tablas.

      Este esquema se mantiene separado de analytics_features porque ya existía antes de la creación del proyecto 
      actual y es utilizado por varios dashboards. Por esta razón, se decidió no modificarlo, con el fin de evitar
      afectar los orígenes de datos en Power BI.

      A futuro, cuando los dashboards que dependen de este esquema sean deprecados, se recomienda migrar estas 
      tablas al esquema analytics_features para mantener mayor consistencia y uniformidad en el modelo de datos.

    tables:
      - name: sucursales
        description: >
          Sucursales aperturadas por Security Data a lo largo de toda su historia. Esta tabla unicamente se debe 
          modificar para agregar nuevas sucursales aperturadas. No eliminar los registros de sucursales cerradas puesto 
          que eliminaria el historico de la misma
        columns:
          - name: id_sucursal
            description: "Id interno de la Tabla"
          - name: nombre_sucursal
            description: "Nombre de la Sucursal en Cuestion"
          - name: ciudad
            description: "Ciudad en la cual se encuentra la sucursal"
          - name: tipo
            description: >
              Campo existente en el Archivo Previo de Sucursal. NO USAR EL CAMPO puesto que la 
              info no se encuentra acorde
          - name: nombre_sucursal_subca
            description: > 
              Identificativo de las sucursales en consultas de SUBCA. Se utiliza para realizar cruces de informacion 
              en Dashboard de Analisis de Sucursales
          - name: tamano
            description: > 
              Clasificacion de la sucursal en funcion de su tamano. Utilizado las paras metas de ventas por 
              sucursal del ano 2025
          - name: tamano_metas
            description: > 
              Clasificacion de la sucursal en funcion de su tamano. Utilizado las paras metas de ventas por sucursal 
              del ano 2025 T4 en el cual se reclasifico ciertas sucursales y se debia mantener un historico

      - name: puntos_emision
        description: |
          Histórico de los puntos de emisión asociados a las distintas sucursales de SD.
        
          En caso de apertura de una nueva sucursal, se debe registrar el punto de emisión
          correspondiente, asociándolo al id_sucursal respectivo.
        
          Para cambios en puntos de emisión de sucursales existentes, se debe actualizar la
          fecha de cierre del registro vigente y crear un nuevo registro con la información
          actualizada. Este nuevo registro debe tener una fecha de cierre definida en el futuro.
        
          No se permite dejar el campo de fecha de cierre vacío.
        columns:
          - name: id_punto_emision
            description: "Id interno de la Tabla"
          - name: id_sucursal
            description: >
              Clave foránea que establece la relación con el punto de emisión correspondiente.

          - name: fecha_apertura
            description: |
              Fecha en la que el punto de emisión inició operaciones.

              Para la validación de la fecha de emisión respecto a la fecha de apertura y cierre,
              se considera el límite inferior inclusivo y el superior exclusivo. Es decir, la fecha
              de emisión debe cumplir la siguiente condición:

              `pf.fecha_emision >= pe.fecha_apertura AND pf.fecha_emision < pe.fecha_cierre`
          - name: fecha_cierre
            description: |
              Fecha en la que el punto de emisión finalizo operaciones.

              Para la validación de la fecha de emisión respecto a la fecha de apertura y cierre,
              se considera el límite inferior inclusivo y el superior exclusivo. Es decir, la fecha
              de emisión debe cumplir la siguiente condición:

              `pf.fecha_emision >= pe.fecha_apertura AND pf.fecha_emision < pe.fecha_cierre`

          - name: serial_punto_emision
            description: "Código serial asignado al punto de emisión."



  - name: fenix_bronze
    schema: analytics_bronze
    description: >
      Capa Bronze (raw data) que contiene las entidades principales extraídas 
      del sistema origen Fenix. Los datos se mantienen en su estado original 
      con la adición de campos de metadatos para auditoría.

    tables:
      # ==========================================
      # TABLA: VENDEDORES
      # ==========================================
      - name: fenix_vendedores
        description: >
          Catálogo de vendedores registrados en el sistema Fenix. La carga incremental funciona con la columna fecha_act.
        columns:
          - name: id_codven
            description: "Llave primaria subrogada autogenerada para la tabla en la base de datos."
            tests:
              - unique
              - not_null
          - name: creation_date
            description: "Metadato: Fecha y hora exacta en la que el registro fue insertado en la capa Bronze."
          - name: update_date
            description: "Metadato: Fecha y hora exacta de la última actualización del registro en la capa Bronze."
          - name: codven
            description: "Código identificador único del vendedor proveniente del sistema origen."
            tests:
              - unique
          - name: nomven
            description: "Nombre completo del vendedor."
          - name: fecha_act
            description: "Fecha de actualización o registro original del vendedor en el sistema Fenix."

      # ==========================================
      # TABLA: CLIENTES
      # ==========================================
      - name: fenix_clientes
        description: > 
          Catálogo de clientes registrados en el sistema Fenix. La carga incremental funciona con la columna fecha_act.
        columns:
          - name: creation_date
            description: "Metadato: Fecha y hora exacta en la que el registro fue insertado en la capa Bronze."
          - name: update_date
            description: "Metadato: Fecha y hora exacta de la última actualización del registro."
          - name: codcli
            description: "Código identificador único del cliente proveniente del sistema origen."
            tests:
              - unique
          - name: nomcli
            description: "Nombre completo o razón social del cliente."
          - name: cif
            description: "Código de Identificación Fiscal, RUC o documento de identidad del cliente."
          - name: fecha_act
            description: "Fecha de actualización o registro original del cliente en el sistema Fenix."

      # ==========================================
      # TABLA: FACTURAS (CABECERA)
      # ==========================================
      - name: fenix_facturas
        description: "Cabecera de las facturas emitidas. Contiene los totales y datos generales de la venta."
        columns:
          - name: id_numfac
            description: "Llave primaria subrogada autogenerada para la tabla de facturas."
            tests:
              - unique
              - not_null
          - name: creation_date
            description: "Metadato: Fecha y hora de inserción en la capa Bronze."
          - name: numfac
            description: |
              Identificador único del documento en el sistema Fenix.

              **Regla de negocio:** `numfac` es el identificador único por documento. Cada factura y cada nota de crédito tienen un `numfac` distinto. Si el valor comienza con `'DV'`, el documento es una nota de crédito (anulación).
            tests:
              - unique
          - name: numdoc
            description: |
              Identificador único del proceso de facturación.

              **Regla de negocio:** Una factura y su nota de crédito (anulación) comparten el mismo `numdoc`. Si existe una nota de crédito asociada a una factura, ambas tienen el mismo valor en este campo.
          - name: cliente
            description: "Código del cliente al que se emite la factura (Clave foránea hacia fenix_clientes.codcli)."
          - name: numser
            description: "Número de serie de la facturación."
          - name: pedido
            description: "Secuencia correlativa del documento. Se concatena con `numser` para construir el número de factura visible: `CONCAT(numser, pedido)`. Ejemplo de resultado: `'001-001-000000001'`."
          - name: comen1
            description: "Primer campo de comentario o campo de observación del documento."
          - name: comen2
            description: "Segundo campo de comentario del documento. Contiene el código de descuento en el formato `'CODDESCUENTO <codigo>'`."
          - name: comen3
            description: |
              Tercer campo de comentario del documento.

              En ventas automatizadas contiene el código del catálogo de productos (`fenix_codigos`). También puede contener indicadores de clasificación de venta: `'COMERCIAL'`, `'F.E.F.A.V.'` (firmas emitidas a Alianza del Valle), o texto con `'TERCER'`, `'DISTRIBUI'`, `'AGENT'`.
          - name: subtotal
            description: "Monto subtotal de la factura antes de impuestos y descuentos."
          - name: desc0
            description: "Monto del descuento global aplicado a la factura."
          - name: iva
            description: "Porcentaje o indicador de Impuesto al Valor Agregado aplicado."
          - name: total_iva
            description: "Monto total calculado correspondiente al IVA."
          - name: total
            description: "Monto total final de la factura (Subtotal - Descuentos + Impuestos)."
          - name: codven
            description: "Código del vendedor que realizó la venta (Clave foránea hacia fenix_vendedores.codven)."
          - name: fecha_hora
            description: "Fecha y hora de emisión original de la factura en el sistema."

      # ==========================================
      # TABLA: TRANFAC (DETALLE DE FACTURAS)
      # ==========================================
      - name: fenix_tranfac
        description: "Detalle transaccional a nivel de línea para cada factura (ítems facturados)."
        columns:
          - name: id_tranfac
            description: "Llave primaria subrogada autogenerada para el detalle de factura."
            tests:
              - unique
              - not_null
          - name: creation_date
            description: "Metadato: Fecha y hora de inserción en la capa Bronze."
          - name: update_date
            description: "Metadato: Fecha y hora de la última actualización del registro."
          - name: unico
            description: "Identificador único de la línea de transacción en el sistema origen."
          - name: numfac
            description: "Número de factura a la que pertenece esta línea (Clave foránea hacia fenix_facturas.numfac)."
          - name: codart
            description: "Código del artículo o producto facturado (Clave foránea hacia fenix_articulos.codart)."
          - name: cantidad_d
            description: "Cantidad del artículo facturado en esta línea."
          - name: precio
            description: "Precio unitario del artículo."
          - name: desct
            description: "Porcentaje de descuento específico aplicado a esta línea de transacción."
          - name: iva
            description: "Porcentaje de IVA aplicado a la línea de factura. Valores posibles: `0` (factura eliminadas las cuales deben ser exluidas), `12` (tasa histórica hasta 2024), `15` (tasa vigente desde 2024)."

      # ==========================================
      # TABLA: ARTÍCULOS
      # ==========================================
      - name: fenix_articulos
        description: >
          Catálogo maestro de artículos o productos disponibles en el sistema. De momento esta tabla no cuenta
          con una actualizacion incremental sino que al correr el Script se procedera a hacer un update en general de 
          toda la tabla, lo cual produce que se borren todos los cambios realizados directamente sobre la tabla
        columns:
          - name: id_codart
            description: "Llave primaria subrogada autogenerada para la tabla de artículos."
            tests:
              - unique
              - not_null
          - name: creation_date
            description: "Metadato: Fecha y hora de inserción en la capa Bronze."
          - name: update_date
            description: "Metadato: Fecha y hora de la última actualización del registro."
          - name: codart
            description: "Código alfanumérico único que identifica al artículo."
            tests:
              - unique
          - name: nomart
            description: "Nombre principal o descripción del artículo."
          - name: nomart2
            description: "Nombre secundario, descripción corta o información adicional del artículo."

      # ==========================================
      # TABLA: CODIGOS
      # ==========================================
      - name: fenix_codigos
        description: >
          Catalogo de codigos de los distintos productos facturados por Fenix. Estos codigos generalmente se encuentran
          dentro del `COMEN3` en los registros de la tabla `facturas` del sistema fenix. Estos codigos se ingresan de
          manera automatica al realizar las ventas
          
          En casos de factuas manual, estos codigos no se agregan de maner aautomatica, por lo cual en estos casos no 
          se puede identificar la informacion correspondiente del producto mediante estos codigos.

        columns:
          - name: id_codigo
            description: Identificador unico del registro del codigo.

          - name: creation_date
            description: Fecha y hora en la que se inserto el registro en la tabla.

          - name: update_date
            description: Fecha y hora de la ultima actualizacion del registro.

          - name: codigo
            description: Codigo unico del producto, equivalente al campo `COMEN3` en la tabla de facturas del sistema Fenix.

          - name: codigo_nombre
            description: Nombre o descripcion del producto asociado al codigo.

          - name: familia_producto
            description: Agrupacion o familia a la que pertenece el producto.

          - name: atencion
            description: Tipo de atencion o canal asociado al producto.

          - name: venta_dirigida
            description: Segmento o perfil de cliente al que esta dirigida la venta del producto.

          - name: concepto_1
            description: Primer concepto o clasificacion adicional del producto.

          - name: concepto_2
            description: Segundo concepto o clasificacion adicional del producto.

          - name: plan
            description: Plan comercial al que pertenece el producto.

          - name: vigencia
            description: Periodo de vigencia o validez del producto.

  - name: camunda_bronze
    schema: analytics_bronze
    description: >
      Capa Bronze (raw data) que contiene las entidades principales extraídas 
      del sistema origen CAMUNDA. EN este apartado los datos no se manejan en su totalidad como datos brutos,
      esto por la gran verbosidad que hubiera requerido definir 4 tablas para obtener una simple tabla de 3 columnas

    tables:

      # ==========================================
      # TABLA: GRUPO VENDEDORES Y VALIDACION VENTA NUEVA INCREMENTAL
      # ==========================================

      - name: camunda_operatividad
        description: |
          Tabla de operatividad del sistema Camunda que registra el ciclo de vida de los trámites
          de firma digital asociados a la emisión de facturas. Contiene información del solicitante,
          el producto, el canal de origen, y los estados de aprobación de cada trámite procesado.
          
          Dentro de esta tabla se cargan los siguientes registros:
          - De la base de Portales SUBCA se cargan los registros de todas las firmas en estado de emision o
          aprobacion
          - De la base de Portal CAMUNDA se cargan los registros de las facturas asociadas a un tramite finalizado
          (Emitido o Aprobado)
          - De la base de Portal CAMUNDA se cargan los registros asociadas a facturas anuladas con la finalidad de 
          dar mayor trazabilidad en cuestion de identificar si eran una emision por primera vez o renovacion
        columns:
          - name: id_operatividad
            description: Identificador único del registro de operatividad del trámite.

          - name: creation_date
            description: Fecha y hora en que se creó el registro en la tabla.

          - name: update_date
            description: Fecha y hora de la última actualización del registro.

          - name: id_tramite
            description: Identificador del trámite de firma digital asociado al proceso en Camunda/Portal SUBCA.

          - name: origen
            description: Canal o sistema desde donde se originó el trámite (web, presencial, API, etc.).

          - name: serial_firma
            description: Número de serie o identificador único del certificado de firma digital utilizado.

          - name: cedula
            description: Número de cédula de identidad del solicitante o titular del trámite.

          - name: fecha_aprobacion
            description: Fecha y hora en que el trámite fue aprobado por el sistema o por un validador.

          - name: factura
            description: Número o referencia de la factura asociada al trámite de firma digital.

          - name: ruc
            description: Registro Único de Contribuyente del cliente o empresa vinculada al trámite.

          - name: tipo_firma
            description: Tipo de firma digital empleada en el trámite (token físico, archivo P12, nube, etc.).

          - name: fecha_inicio_tramite
            description: Fecha y hora en que se inició formalmente el trámite en el sistema.

          - name: ruc_aux
            description: RUC auxiliar o secundario asociado al trámite, utilizado cuando interviene una empresa diferente al titular.

          - name: medio
            description: Medio o canal a través del cual se realizó el trámite (web, app móvil, presencial, etc.).

          - name: sf_control
            description: Código o indicador de control del sistema de facturación para validar la integridad del trámite.

          - name: producto
            description: Producto o servicio de firma digital contratado y asociado al trámite.

          - name: grupo_vendedor
            description: Grupo comercial o equipo de ventas responsable de gestionar el trámite.

          - name: estado
            description: Estado actual del trámite dentro del flujo de Camunda (aprobado, pendiente, rechazado, en proceso, etc.).

          - name: fecha_factura
            description: Fecha de emisión de la factura vinculada al trámite de firma digital.

  - name: features_by_code
    schema: analytics_features
    tables:
      - name: facturas_excluidas
        description: >
          Tabla que contiene las facturas excluidas del análisis de facturación regular. Agrupa dos tipos de registros:
          facturas de venta de activos fijos, y facturas anuladas dentro del sistema Fenix. Los registros correspondientes a firmas anuladas
          se incorporan de manera automática en cada período de carga para el caso donde el total_iva es igual a cero.
        columns:
          - name: codigo_factura
            description: Código o número identificador de la factura excluida en el sistema Fenix.

          - name: motivo
            description: Razón por la cual la factura fue excluida (venta de activo, firma anulada, etc.).

          - name: creation_date
            description: Fecha y hora en que se registró la exclusión de la factura en esta tabla.

          - name: update_date
            description: Fecha y hora de la última modificación del registro de exclusión.

