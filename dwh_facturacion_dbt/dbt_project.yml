
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dwh_facturacion_dbt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dwh_facturacion_dbt'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  dwh_facturacion_dbt:
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
    datamarts:
      +materialized: view
      +schema: datamarts

seeds:
  dwh_facturacion_dbt:
    facturas_excluidas:
      +schema: features
      +column_types:
        codigo_documento: varchar(30)
        motivo: varchar(200)

    reasignacion_periodo_fiscal:
      +schema: features
      +column_types:
        numero_factura: varchar(30)
        motivo: varchar(200)

    reasignacion_islas_temporales:
      +schema: features
      +column_types:
        numero_factura: varchar(30)
        id_sucursal: integer

    articulos_comercial:
      +schema: features
      +column_types:
        codigo_articulo: varchar(30)
        verificacion_vendedor: boolean

    fenix_articulos_corregidos:
      +schema: features
      +column_types:
        creation_date: timestamp
        update_date: timestamp
        codigo: text
        nombre: text
        vigencia: text
        familia: text
        tipo_plan: text
        concepto: text

    vendedores_comercial:
      +schema: features
      +column_types:
        codigo_vendedor: varchar(10)
        fecha_inicio: timestamp
        fecha_fin: timestamp

    vendedores_agentes:
      +schema: features
      +column_types:
        codigo_vendedor: varchar(10)
        agente: varchar(50)


    reasignacion_comercial:
      +schema: features
      +column_types:
        codigo_documento: varchar(20)
        motivo: varchar(255)

    equivalencia_comentario_codigo:
      +schema: features
      +column_types:
        codigo_articulo: varchar(30)
        codigo_comentario_3: varchar(30)

    reasignacion_grupo_vendedor:
      +schema: features
      +column_types:
        codigo_documento: varchar(30)
        grupo_asignado: varchar(30)
        motivo: varchar(255)





